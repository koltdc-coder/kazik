<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

<title>XL SOFT</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html,
body{
    width:100%;
    overflow-x:hidden;
    background:#000;
    font-family:'Montserrat',sans-serif;
    color:#fff;
}

body{
    background:
    radial-gradient(circle at top,#201207 0%,#000 45%);
}

/* Основной контейнер — максимальная ширина 480px */
.app{
    width:100%;
    max-width:480px;
    margin:auto;
    padding:14px;
    min-height:100vh;
}

/* TOP */

.stats{

    display: flex;
    align-items: center;
    justify-content: space-around;
    gap: 0px;
    padding: 8px;
    border-radius: 24px;
    background: linear-gradient(180deg, #21140b, #090502);
    border: 1px solid rgba(255, 170, 0, .16);
    box-shadow: 0 0 15px rgba(255, 136, 0, .10), inset 0 0 20px rgba(255, 166, 0, .04);
    margin-bottom: 12px;
}

.stat{
    display:flex;
    align-items:center;
    gap:8px;

    font-size:12px;
    font-weight:700;
}

.light{
    opacity:.7;
    font-weight:500;
}

.red-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#ff4b4b;
    box-shadow:0 0 10px #ff4b4b;

    animation:pulse 1.2s infinite;
}

.green{
    color:#2cff73;
}

@keyframes pulse{

    0%{
        transform:scale(1);
        opacity:1;
    }

    50%{
        transform:scale(1.45);
        opacity:.45;
    }

    100%{
        transform:scale(1);
        opacity:1;
    }

}

/* TICKER */

.ticker{
    overflow:hidden;
    margin-bottom:12px;
}

.ticker-track{
    display:flex;
    gap:12px;
    width:max-content;

    animation:ticker 45s linear infinite;
}

.win-box{

  min-width: 156px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 12px;
    border-radius: 22px;
    background: linear-gradient(180deg, #1d130a, #080502);
    border: 1px solid rgba(255, 179, 0, .12);
    font-size: 12px;
    font-weight: 700;
}

.green-dot{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #2cff73;
    box-shadow: 0 0 8px #2cff73;
}

@keyframes ticker{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }

}

/* PROMO */

.promo{

   display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0px;
    padding: 8px 12px;
    border-radius: 28px;
    background: radial-gradient(circle at center, #013c14 0%, #001307 100%);
    border: 2px solid rgba(0, 255, 106, .24);
    box-shadow: 0 0 30px rgba(0, 255, 94, .12), inset 0 0 30px rgba(0, 255, 94, .05);
    margin-bottom: 18px;
}

.promo-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.gift{

   width: 40px;
    height: 40px;
    border-radius: 18px;
    background: rgba(255, 255, 255, .08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}

.promo-title{
   font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
}

.promo-bonus{
   font-size: 16px;
    line-height: 1;
    font-weight: 700;
    color: #22ff73;
}

.promo-right{
    display:flex;
    align-items:center;
    gap:10px;
}

.info{
   width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #f3d38c;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
}

.copy-promo-btn{

    min-width: 80px;
    height: 42px;
    border-radius: 18px;
    background: linear-gradient(180deg, #ffe18c, #f0ae38);
    border: none;
    color: #000;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    padding: 0 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* GAMES */

.games{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.card{

    position:relative;

    padding:14px;

    border-radius:28px;

    background:
    linear-gradient(180deg,#24170d,#090502);

    border:1px solid rgba(255,183,0,.18);

    box-shadow:
    0 0 20px rgba(255,162,0,.10),
    inset 0 0 24px rgba(255,162,0,.04);
}

.badge{

    position:absolute;

    top:10px;
    right:10px;

    padding:7px 12px;

    border-radius:16px;

    font-size:13px;
    font-weight:800;
}

.hot{
    background:#ffd84d;
    color:#000;
}

.new{
    background:#4be4ff;
    color:#000;
}

.vip{
    background:#ffe36d;
    color:#000;
}

.top{
    background:#ff4b4b;
}

.game-image{
    width:100%;
    aspect-ratio:1/1;
    border-radius:18px;
    overflow:hidden;
    margin-bottom:14px;
}

.game-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.game-title{
    text-align:center;
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:12px;
}

.play-btn{

    width: 100%;
    height: 40px;
    border: none;
    outline: none;
    border-radius: 18px;
    background: linear-gradient(180deg, #ffe18c, #f0ae38);
    color: #000;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
}

/* JACKPOT */

.jackpot{

    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    bottom: -200px;
    width: 92%;
    max-width: 450px;
    padding: 6px 8px;
    border-radius: 28px;
    background: linear-gradient(90deg, #45141c, #2c160b);
    border: 2px solid rgba(255, 90, 115, .45);
    box-shadow: 0 0 35px rgba(255, 90, 115, .18);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: .55s;
    z-index: 9999;
}

.jackpot.show{
    bottom:18px;
}

.flag{

        width: 40px;
    height: 40px;
    border-radius: 18px;
    background: rgba(255, 255, 255, .08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
}

.jackpot small{
    font-size:12px;
    opacity:.85;
}

.jackpot h2{
    margin-top: 0px;
    font-size: 16px;
    color: #ff7187;
}

/* Верхняя панель с промокодом (слайд сверху) */
.top-notification{
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%) translateY(-120%);
    width: 92%;
    max-width: 430px;
    z-index: 99999;
    transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
}

.top-notification.show{
    transform: translateX(-50%) translateY(10px);
    pointer-events: auto;
}

.notification-inner{
    border-radius: 34px;
    padding: 24px;
    background: radial-gradient(circle at top, #29170d 0%, #080402 100%);
    border: 2px solid rgba(255,196,0,.18);
    box-shadow: 0 0 40px rgba(255,170,0,.12), inset 0 0 30px rgba(255,170,0,.05);
    position: relative;
}

.notif-close{
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255, 255, 255, .2);
    background: rgba(255, 255, 255, .06);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
    cursor: pointer;
    line-height: 1;
}

.notif-top{
    display: flex;
    gap: 18px;
}

.notif-gift{
    width: 72px;
    height: 72px;
    min-width: 72px;
    border-radius: 22px;
    background: rgba(255, 255, 255, .08);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
}

.notif-title{
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 8px;
}

.notif-text{
    font-size: 14px;
    line-height: 1.2;
    opacity: .92;
}

.promo-copy{

    margin-top: 26px;
    border-radius: 28px;
    padding: 12px 18px;
    background: radial-gradient(circle at center, #013d15 0%, #001307 100%);
    border: 2px solid rgba(0, 255, 98, .22);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0px;
}

.copy-left small{
    display: block;
    font-size: 10px;
    letter-spacing: 0px;
    opacity: .75;
    margin-bottom: 0px;
}

.copy-left h2{
    color: #22ff73;
    font-size: 20px;
    letter-spacing: 1px;
}

.copy-btn{

    border: none;
    min-width: 120px;
    height: 44px;
    border-radius: 22px;
    background: #1df36d;
    color: #000;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
}

</style>

</head>

<body>

<div class="app">

    <!-- TOP -->

    <div class="stats">

        <div class="stat">

            <div class="red-dot"></div>

            <div>
                <span id="online">3114</span>
                <span class="light"> playing now</span>
            </div>

        </div>

        <div class="stat">

            <span class="green">
                +<span id="wins">143</span>
            </span>

            <span class="light"> won last hour</span>

        </div>

    </div>

    <!-- TICKER -->

    <div class="ticker">
        <div class="ticker-track" id="ticker"></div>
    </div>

    <!-- PROMO -->

    <div class="promo">

        <div class="promo-left">

            <div class="gift">🎁</div>

            <div>

                <div class="promo-title">
                    PROMOCODE: ROBBER
                </div>

                <div class="promo-bonus">
                    +500% & 500FS
                </div>

            </div>

        </div>

        <div class="promo-right">

            <div class="info" id="openNotification">
                i
            </div>

            <button class="copy-promo-btn" id="promoCopyBtn">
                Copy
            </button>

        </div>

    </div>

    <!-- GAMES -->

    <div class="games">

        <div class="card">

            <div class="badge hot">HOT</div>

           <div class="game-image">
    <img src="game-1.gif">
</div>

            <div class="game-title">
                AVIAMASTERS 2
            </div>

            <button
            class="play-btn"
            onclick="window.location.href='https://google.com'">
                ▶ PLAY
            </button>

        </div>

        <div class="card">

            <div class="badge new">NEW</div>

            <div class="game-image">
                <img src="game-2.gif">
            </div>

            <div class="game-title">
                TOWER RUSH
            </div>

            <button
            class="play-btn"
            onclick="window.location.href='https://google.com'">
                ▶ PLAY
            </button>

        </div>

        <div class="card">

            <div class="badge vip">VIP</div>

            <div class="game-image">
                <img src="game-3.gif">
            </div>

            <div class="game-title">
                TAPPY BIRD
            </div>

            <button
            class="play-btn"
            onclick="window.location.href='https://google.com'">
                ▶ PLAY
            </button>

        </div>

        <div class="card">

            <div class="badge top">TOP</div>

            <div class="game-image">
                 <img src="game-4.gif">
            </div>

            <div class="game-title">
                XL SOFT SIGNALS
            </div>

             <button
            class="play-btn"
            onclick="window.location.href='https://google.com'">
                ▶ PLAY
            </button>

        </div>

    </div>

</div>

<!-- JACKPOT -->

<div class="jackpot" id="jackpot">

    <div class="flag" id="flag">
        🇫🇷
    </div>

    <div>

        <small id="jackpotId">
            ID: 428***
        </small>

        <h2 id="jackpotText">
            JACKPOT +$7,103
        </h2>

    </div>

</div>

<!-- Верхняя панель с промокодом (появляется по клику на "i") -->

<div class="top-notification" id="topNotification">

    <div class="notification-inner">

        <div class="notif-close" id="closeNotification">
            ×
        </div>

        <div class="notif-top">

            <div class="notif-gift">
                🎁
            </div>

            <div>

                <div class="notif-title">
                    Заберите бонус
                </div>

                <div class="notif-text">
                    Зарегистрируйтесь сейчас и получите бонус 500% и 500FS, используя этот промокод.
                </div>

            </div>

        </div>

        <div class="promo-copy">

            <div class="copy-left">

                <small>ПРОМОКОД</small>

                <h2 id="topPromoCode">
                    ROBBER
                </h2>

            </div>

            <button class="copy-btn" id="topCopyBtn">
                Copy
            </button>

        </div>

    </div>

</div>

<script>

/* ONLINE */

let online = 3114;

setInterval(()=>{

    online += Math.floor(Math.random()*11)-5;

    if(online < 2800) online = 2800;
    if(online > 3400) online = 3400;

    document.getElementById('online').innerText = online;

},2500);

/* WINS */

let wins = 143;

setInterval(()=>{

    wins += Math.floor(Math.random()*7)-3;

    if(wins < 100) wins = 100;
    if(wins > 220) wins = 220;

    document.getElementById('wins').innerText = wins;

},3000);

/* TICKER */

const ticker = document.getElementById('ticker');

function tickerItem(){

    const id =
    Math.floor(Math.random()*900)+100;

    const amount =
    Math.floor(Math.random()*900)+100;

    return `
    <div class="win-box">

        <div class="green-dot"></div>

        <div>
            ID: ${id}***
        </div>

        <div class="green">
            +$${amount}
        </div>

    </div>
    `;
}

let tickerHtml = '';

for(let i=0;i<20;i++){
    tickerHtml += tickerItem();
}

ticker.innerHTML = tickerHtml + tickerHtml;

/* JACKPOT */

const jackpot = document.getElementById('jackpot');

const flags = [
'🇺🇸',
'🇨🇦',
'🇩🇪',
'🇧🇷',
'🇺🇦',
'🇺🇿',
'🇵🇱',
'🇮🇹',
'🇫🇷',
'🇪🇸'
];

function showJackpot(){

    const id =
    Math.floor(Math.random()*900)+100;

    const amount =
    (
        Math.floor(Math.random()*9000)+500
    ).toLocaleString();

    const flag =
    flags[
        Math.floor(Math.random()*flags.length)
    ];

    document.getElementById('flag').innerText =
    flag;

    document.getElementById('jackpotId').innerText =
    `ID: ${id}***`;

    document.getElementById('jackpotText').innerText =
    `JACKPOT +$${amount}`;

    jackpot.classList.add('show');

    // Автоматически скрываем через 5 секунд
    setTimeout(()=>{
        jackpot.classList.remove('show');
    },5000);

}

let jackpotTimer = null;

function scheduleNextJackpot() {
    // Очищаем предыдущий таймер на всякий случай
    if (jackpotTimer) clearTimeout(jackpotTimer);
    
    // Случайный интервал от 11 до 17 секунд
    const next = Math.floor(Math.random() * 6000) + 11000;
    
    jackpotTimer = setTimeout(() => {
        showJackpot();
        // После показа планируем следующий
        scheduleNextJackpot();
    }, next);
}

// Запускаем первый джекпот через 11–17 секунд после загрузки
scheduleNextJackpot();

/* ВЕРХНЯЯ ПАНЕЛЬ С ПРОМОКОДОМ (слайд сверху) */

const topNotification = document.getElementById('topNotification');
const promoCode = 'ROBBER';

function showNotification() {
    topNotification.classList.add('show');
    // автоматически скрыть через 8 секунд, если не закрыли вручную
    clearTimeout(window.notifTimeout);
    window.notifTimeout = setTimeout(() => {
        topNotification.classList.remove('show');
    }, 8000);
}

function hideNotification() {
    topNotification.classList.remove('show');
    clearTimeout(window.notifTimeout);
}

document.getElementById('openNotification').addEventListener('click', showNotification);
document.getElementById('closeNotification').addEventListener('click', hideNotification);

// Копирование из кнопки в promo-right (рядом с i)
document.getElementById('promoCopyBtn').addEventListener('click', async function() {
    try {
        await navigator.clipboard.writeText(promoCode);
        const btn = this;
        btn.textContent = 'Copied';
        setTimeout(() => {
            btn.textContent = 'Copy';
        }, 1500);
    } catch (err) {
        // fallback
        alert('Скопируйте вручную: ' + promoCode);
    }
});

// Копирование из верхней панели
document.getElementById('topCopyBtn').addEventListener('click', async function() {
    try {
        await navigator.clipboard.writeText(promoCode);
        const btn = this;
        btn.textContent = 'Copied';
        setTimeout(() => {
            btn.textContent = 'Copy';
        }, 1500);
    } catch (err) {
        alert('Скопируйте вручную: ' + promoCode);
    }
});

</script>

</body>
</html>
